name: CI - Build, Test & SonarCloud

on:
  push:
    branches: [ "main", "main2" ]
  pull_request:
    branches: [ "main", "main2" ]

jobs:
  hospital-service:
    name: HospitalService - Build, Test & SonarCloud
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: HospitalService

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run tests
        run: mvn clean verify -B

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=hiranoshadha_Test-HealthCare \
            -Dsonar.organization=hiranoshadha \
            -Dsonar.host.url=https://sonarcloud.io \
            -B

  doctor-service:
    name: DoctorService - Build, Test & SonarCloud
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: doctor-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run tests
        run: mvn clean verify -B

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=hiranoshadha_Test-HealthCare-doctor-service \
            -Dsonar.organization=hiranoshadha \
            -Dsonar.host.url=https://sonarcloud.io \
            -B

  appointment-service:
    name: AppointmentService - Build, Test & SonarCloud
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: appointment-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run tests
        run: mvn clean verify -B

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=hiranoshadha_Test-HealthCare-appointment-service \
            -Dsonar.organization=hiranoshadha \
            -Dsonar.host.url=https://sonarcloud.io \
            -B

  user-service:
    name: UserService - Build, Test & SonarCloud
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: UserService

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run tests
        run: mvn clean verify -B

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=hiranoshadha_Test-HealthCare-user-service \
            -Dsonar.organization=hiranoshadha \
            -Dsonar.host.url=https://sonarcloud.io \
            -B

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [hospital-service, doctor-service, appointment-service, user-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK }}"
