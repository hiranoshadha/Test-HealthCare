<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Management — MediConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:       #0ea5e9;
      --primary-dark:  #0284c7;
      --secondary:     #06b6d4;
      --accent:        #8b5cf6;
      --success:       #10b981;
      --danger:        #ef4444;
      --warning:       #f59e0b;
      --bg:            #080f1a;
      --bg-card:       #0f1c2e;
      --bg-card2:      #162033;
      --border:        #1e3248;
      --border-light:  #243a52;
      --text:          #e8f4fd;
      --text-muted:    #7ea8c9;
      --text-dim:      #3d6080;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 256px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 200; }
    .logo { padding: 28px 20px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 0 20px rgba(14,165,233,.35); }
    .logo-name { font-size: 17px; font-weight: 800; background: linear-gradient(135deg, #e0f2ff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-sub { font-size: 10px; color: var(--text-dim); font-weight: 500; letter-spacing: .5px; }
    .nav { flex: 1; padding: 20px 12px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); font-size: 13.5px; font-weight: 500; text-decoration: none; margin-bottom: 5px; transition: all .2s; }
    .nav-item:hover { background: rgba(14,165,233,.08); color: var(--primary); }
    .nav-item.active { background: linear-gradient(135deg, rgba(14,165,233,.15), rgba(139,92,246,.08)); color: var(--primary); border: 1px solid rgba(14,165,233,.18); }
    .nav-icon { width: 20px; text-align: center; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid var(--border); }
    .main { margin-left: 256px; flex: 1; padding: 36px 36px 60px; min-height: 100vh; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 26px; }
    .page-title { font-size: 26px; font-weight: 700; letter-spacing: .2px; }
    .page-sub { color: var(--text-muted); margin-top: 6px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: 0 20px 45px rgba(0,0,0,.25); }
    .grid { display: grid; gap: 18px; }
    .flex { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .form-row { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 16px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; }
    .form-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
    .form-input, .form-select, .form-button { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 14px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14,165,233,.14); }
    .form-button { cursor: pointer; border: none; color: #fff; background: linear-gradient(135deg,var(--primary),var(--secondary)); font-weight: 600; }
    .form-button:disabled { opacity: .6; cursor: not-allowed; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
    th { color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    tbody tr:hover { background: rgba(14,165,233,.08); }
    .btn-danger { background: linear-gradient(135deg, rgba(239,68,68,.9), rgba(239,68,68,.7)); }
    .btn-secondary { background: rgba(100,116,139,.2); color: var(--text); }
    .msg { margin-bottom: 14px; padding: 9px 12px; border-radius: 10px; font-size: 13px; }
    .msg.success { background: rgba(16,185,129,.13); border: 1px solid rgba(16,185,129,.35); color: var(--success); }
    .msg.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: var(--danger); }
    @media (max-width: 960px) { .form-row { grid-template-columns: 1fr; } }
    @media (max-width: 780px) { .main { padding: 24px 18px 40px; } }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🩺</div>
      <div><div class="logo-name">MediConnect</div><div class="logo-sub">Doctor Hub</div></div>
    </div>
    <nav class="nav">
      <a id="navHospital" class="nav-item" href="hospital.html"><span class="nav-icon">🏥</span>Hospitals</a>
      <a id="navDoctor" class="nav-item" href="doctor-registration.html"><span class="nav-icon">👩‍⚕️</span>Doctors</a>
      <a id="navSchedule" class="nav-item active" href="schedule.html"><span class="nav-icon">📅</span>Schedules</a>
      <a id="navAppointment" class="nav-item" href="appointment.html"><span class="nav-icon">🗓️</span>Appointments</a>
      <a id="navUser" class="nav-item" href="user-profile.html"><span class="nav-icon">👤</span>Profile</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div><h1 class="page-title">Schedule Manager</h1><div class="page-sub">Create and manage your schedules.</div></div>
      <div class="flex"><button class="form-button btn-secondary" onclick="loadSchedules()">Refresh</button><button class="form-button" onclick="logout()">Logout</button></div>
    </div>

    <div id="messageContainer"></div>

    <div class="card">
      <h2 style="margin-bottom:12px;">Add New Schedule (Doctor: <span id="currentDoctorId">-</span>)</h2>
      <div class="grid">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Doctor ID</label><input id="doctorId" class="form-input" type="number" readonly></div>
          <div class="form-group"><label class="form-label" for="hospitalId">Hospital</label><select id="hospitalId" class="form-select"></select></div>
          <div class="form-group"><label class="form-label" for="dayOfWeek">Day of Week</label><select id="dayOfWeek" class="form-select"><option value="MONDAY">Monday</option><option value="TUESDAY">Tuesday</option><option value="WEDNESDAY">Wednesday</option><option value="THURSDAY">Thursday</option><option value="FRIDAY">Friday</option><option value="SATURDAY">Saturday</option><option value="SUNDAY">Sunday</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label" for="startTime">Start Time</label><input id="startTime" class="form-input" type="time"></div>
          <div class="form-group"><label class="form-label" for="endTime">End Time</label><input id="endTime" class="form-input" type="time"></div>
          <div class="form-group"><label class="form-label" for="slotDuration">Slot Duration (minutes)</label><input id="slotDuration" class="form-input" type="number" min="5" value="30"></div>
        </div>
        <div><button class="form-button" type="button" onclick="createSchedule()">Create Schedule</button></div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2 style="margin-bottom:12px;">Search Schedules</h2>
      <div class="form-row">
        <div class="form-group"><label class="form-label" for="filterHospital">Hospital</label><select id="filterHospital" class="form-select"><option value="">All</option></select></div>
        <div class="form-group"><label class="form-label" for="filterDoctor">Doctor</label><select id="filterDoctor" class="form-select"><option value="">All</option></select></div>
        <div class="form-group" style="align-self:flex-end"><button class="form-button" type="button" onclick="applyFilters()">Apply Filter</button></div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2 style="margin-bottom:12px;">Existing Schedules</h2>
      <div class="table-wrap"><table id="scheduleTable"><thead><tr>
        <th>ID</th><th>Doctor</th><th>Hospital</th><th>Day</th><th>Start</th><th>End</th><th>Slot</th><th>Actions</th>
      </tr></thead><tbody></tbody></table></div>
    </div>
  </main>
</div>

<script>
  const API_DOCTOR = 'https://doctor-service-3h4t.onrender.com';
  const API_HOSPITAL = 'https://hospitalservice-633n.onrender.com';

  let auth = null;
  let currentSchedules = [];

  function showMessage(message, type = 'success') {
    const container = document.getElementById('messageContainer');
    container.innerHTML = `<div class="msg ${type}">${message}</div>`;
    setTimeout(() => { container.innerHTML = ''; }, 4500);
  }

  function checkAuth() {
    const token = localStorage.getItem('token');
    const user = localStorage.getItem('user');
    const role = localStorage.getItem('role');
    if (!token || !user || !role) {
      window.location.href = 'login.html';
      return null;
    }
    try {
      return { token, user: JSON.parse(user), role };
    } catch {
      window.location.href = 'login.html';
      return null;
    }
  }

  function updateNavigation() {
    const role = auth.role;
    const navDoctor = document.getElementById('navDoctor');
    const navHospital = document.getElementById('navHospital');
    const navUser = document.getElementById('navUser');
    const navSchedule = document.getElementById('navSchedule');
    const navAppointment = document.getElementById('navAppointment');

    navDoctor.style.display = 'none'; navHospital.style.display = 'none'; navUser.style.display = 'none'; navSchedule.style.display = 'none'; navAppointment.style.display = 'none';

    if (role === 'ADMIN') {
      navDoctor.style.display = 'flex';
      navHospital.style.display = 'flex';
      navUser.style.display = 'flex';
    } else if (role === 'DOCTOR') {
      navSchedule.style.display = 'flex';
      navUser.style.display = 'flex';
    } else if (role === 'PATIENT') {
      navAppointment.style.display = 'flex';
      navUser.style.display = 'flex';
    }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }



  async function loadHospitals() {
    try {
      const res = await fetch(`${API_HOSPITAL}/api/hospitals`);
      if (!res.ok) throw new Error('Unable to load hospitals');
      const hospitals = await res.json();
      const hospitalSelect = document.getElementById('hospitalId');
      const filterHospital = document.getElementById('filterHospital');
      hospitalSelect.innerHTML = '<option value="">Select hospital</option>';
      filterHospital.innerHTML = '<option value="">All</option>';
      hospitals.forEach(h => {
        hospitalSelect.insertAdjacentHTML('beforeend', `<option value="${h.hospitalId}">${h.name || 'Hospital ' + h.hospitalId}</option>`);
        filterHospital.insertAdjacentHTML('beforeend', `<option value="${h.hospitalId}">${h.name || 'Hospital ' + h.hospitalId}</option>`);
      });
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  async function loadSchedules() {
    try {
      let res = await fetch(`${API_DOCTOR}/api/schedules`);
      if (!res.ok) throw new Error('Unable to fetch schedules');
      const schedules = await res.json();
      currentSchedules = schedules;
      renderSchedules(schedules);
      collectDoctorOptions(schedules);
      showMessage(`Loaded ${schedules.length} schedules`, 'success');
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  function collectDoctorOptions(schedules) {
    const doctorSelect = document.getElementById('filterDoctor');
    const existing = new Set();
    doctorSelect.innerHTML = '<option value="">All</option>';
    schedules.forEach(s => {
      if (!existing.has(s.doctorId)) {
        existing.add(s.doctorId);
        doctorSelect.insertAdjacentHTML('beforeend', `<option value="${s.doctorId}">${s.doctorId}</option>`);
      }
    });
  }

  async function applyFilters() {
    try {
      const hospitalId = document.getElementById('filterHospital').value;
      const doctorId = document.getElementById('filterDoctor').value;

      if (doctorId) {
        const res = await fetch(`${API_DOCTOR}/api/schedules/doctor/${doctorId}`);
        if (!res.ok) throw new Error('Filter by doctor failed');
        currentSchedules = await res.json();
      } else if (hospitalId) {
        const res = await fetch(`${API_DOCTOR}/api/schedules/hospital/${hospitalId}`);
        if (!res.ok) throw new Error('Filter by hospital failed');
        currentSchedules = await res.json();
      } else {
        return loadSchedules();
      }
      renderSchedules(currentSchedules);
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  async function renderSchedules(schedules) {
    const tbody = document.querySelector('#scheduleTable tbody');
    tbody.innerHTML = '';
    const doctorId = auth.user.doctorId;
    schedules.forEach(s => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${s.scheduleId}</td>
        <td>${s.doctorId}</td>
        <td>${s.hospitalId}</td>
        <td>${s.dayOfWeek}</td>
        <td>${s.startTime}</td>
        <td>${s.endTime}</td>
        <td>${s.slotDuration}</td>
        <td><button class="form-button btn-danger" ${s.doctorId !== doctorId ? 'disabled' : ''} onclick="deleteSchedule(${s.scheduleId})">Delete</button></td>
      `;
      tbody.appendChild(row);
    });
  }

  async function createSchedule() {
    const hospitalId = Number(document.getElementById('hospitalId').value);
    const dayOfWeek = document.getElementById('dayOfWeek').value;
    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;
    const slotDuration = Number(document.getElementById('slotDuration').value);

    if (!hospitalId || !dayOfWeek || !startTime || !endTime || !slotDuration) {
      showMessage('Please fill all schedule fields', 'error');
      return;
    }

    const doctorId = auth.user.doctorId;
    if (!doctorId) {
      showMessage('Only doctors can create schedules', 'error');
      return;
    }

    try {
      const res = await fetch(`${API_DOCTOR}/api/schedules`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ doctorId, hospitalId, dayOfWeek, startTime, endTime, slotDuration })
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText || 'Failed to create schedule');
      }

      const saved = await res.json();
      showMessage(`Schedule ${saved.scheduleId} created`, 'success');
      loadSchedules();
    } catch (e) {
      showMessage(e.message || e, 'error');
    }
  }

  async function deleteSchedule(scheduleId) {
    try {
      const selected = currentSchedules.find(s => s.scheduleId === scheduleId);
      if (!selected || selected.doctorId !== auth.user.doctorId) {
        showMessage('You can only delete your own schedules.', 'error');
        return;
      }

      if (!confirm('Delete schedule ' + scheduleId + '?')) return;

      const res = await fetch(`${API_DOCTOR}/api/schedules/${scheduleId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      showMessage(`Schedule ${scheduleId} deleted`, 'success');
      loadSchedules();
    } catch (e) {
      showMessage(e.message || e, 'error');
    }
  }

  (function init() {
    auth = checkAuth();
    if (!auth) return;
    updateNavigation();
    if (auth.role !== 'DOCTOR') {
      showMessage('Restricted: schedule management for doctors only.', 'error');
    }
    document.getElementById('doctorId').value = auth.user.doctorId || '';
    document.getElementById('currentDoctorId').textContent = auth.user.doctorId || 'N/A';
    loadHospitals();
    loadSchedules();
  })();
</script>
</body>
</html>
